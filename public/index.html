<!DOCTYPE html>
<html lang="pt">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Fleves Music</title>

    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

</head>

<body>

    <header class="topbar" id="topbar">
        <button id="menuToggle" class="menu-toggle">
            ☰
        </button>

        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div>
                <div class="logo">
                    <div class="logo-icon">🎵</div>

                    <div>
                        <h2>Fleves</h2>

                        <p>Music Streaming</p>
                    </div>
                </div>

                <nav>
                    <button class="nav-btn active">
                        🏠 <span>Início</span>
                    </button>

                    <button id="trendingBtn" class="nav-btn">
                        🔥 <span>Trending</span>
                    </button>

                    <button id="favoritosBtn" class="nav-btn">
                        ❤️ <span>Favoritos</span>
                    </button>
                </nav>
            </div>
        </aside>

    </header>

    <!-- MAIN -->
    <main class="main-content">

        <!-- TOPBAR -->
        <header class="topbar">
            <div>
                <h1>Descubra novas músicas 🎧</h1>

                <p>Streaming e downloads ilimitados</p>
            </div>

            <div class="search-box">
                <input type="text" id="search" placeholder="Pesquisar músicas ou artistas...">

                <button onclick="searchMusic()">Buscar</button>
            </div>
        </header>

        <!-- RESULTADOS -->
        <section>
            <h2 class="section-title">Resultados</h2>

            <div id="results" class="songs-grid"></div>
        </section>
    </main>

    <!-- PLAYER -->
    <footer class="player" class="player" id="player">
        <div class="player-left">
            <div class="music-disc"></div>

            <div class="music-info">
                <h3 id="now-playing"> Nenhuma música</h3>

                <p id="artist-playing">Escolha uma música</p>

            </div>
        </div>

        <audio id="player" controls></audio>

    </footer>

    <script>
        const menuToggle = document.getElementById("menuToggle");
        const sidebar = document.getElementById("sidebar");

        menuToggle.addEventListener("click", () => {
            sidebar.classList.toggle("active");
        });

        document.addEventListener("click", (e) => {

            if (
                !sidebar.contains(e.target) &&
                !menuToggle.contains(e.target)
            ) {
                sidebar.classList.remove("active");
            }

        });

        const topbar = document.getElementById("topbar");
        const player = document.getElementById("player");

        let lastScroll = 0;

        window.addEventListener("scroll", () => {

            const currentScroll = window.pageYOffset;

            if (currentScroll > lastScroll && currentScroll > 100) {

                // DESCENDO
                topbar.classList.add("hide");
                player.classList.add("hide");

            } else {

                // SUBINDO
                topbar.classList.remove("hide");
                player.classList.remove("hide");

            }

            lastScroll = currentScroll;

        });

    </script>
</body>

</html>
